spring.application.name=research-review

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
spring.main.allow-bean-definition-overriding=true
spring.jpa.hibernate.ddl-auto=update

spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS_ENABLE:false}

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/${DB}}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=update

# Liquibase
spring.liquibase.enabled=false
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml
spring.liquibase.default-schema=public

# Redis configuration
spring.data.redis.host=${SPRING_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${SPRING_REDIS_SSL:false}

# Elasticsearch configuration (optional)
spring.elasticsearch.uris=http://elasticsearch:9200

spring.cloud.aws.region.static=auto
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY:}  
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_KEY:}
spring.cloud.aws.s3.endpoint=${AWS_S3_ENDPOINT:}

# S3 Configuration
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:research-review-templates}
custom.front-end-url=${FRONTEND_URL:}
custom.extra-front-end-urls=${EXTRA_FRONTEND_URLS:}
custom.jwt-secret=${JWT_SECRET_KEY:}
custom.access-expiration=${JWT_ACCESS_EXPIRATION_MS:}
custom.refresh-expiration=${JWT_REFRESH_EXPIRATION_MS:}
custom.redis-key-secret=${REDIS_KEY_SECRET:}
custom.jwt-public-pem-key=${JWT_PUBLIC_PEM_KEY:}
custom.jwt-private-pem-key=${JWT_PRIVATE_PEM_KEY:}

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${OAUTH2_JWK_SET_URI:}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${OAUTH2_ISSUER_URI:}

# File upload limits (support attachments up to 15MB to cover 10MB requirement)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
server.tomcat.max-swallow-size=20MB

# Feature flags (safe defaults)
feature.conference-model-enabled=true
feature.structured-review-enabled=true
feature.review-threshold-gate-enabled=true
feature.demo-seed-enabled=false

# i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.web.locale-resolver=accept-header
