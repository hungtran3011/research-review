databaseChangeLog:
  - changeSet:
      id: 0006-update-notification-type-check-constraint
      author: copilot
      comment: Update notification type check constraint to include REVIEW_THRESHOLD_REACHED
      changes:
        - sql:
            sql: |
              ALTER TABLE notification
              DROP CONSTRAINT IF EXISTS notification_type_check;
        - sql:
            sql: |
              ALTER TABLE notification
              ADD CONSTRAINT notification_type_check
              CHECK (type IN ('ARTICLE_SUBMITTED', 'ARTICLE_STATUS_CHANGED', 'REVIEW_THRESHOLD_REACHED', 'REVIEWER_INVITED', 'REVIEWER_REVOKED', 'COMMENT_ACTIVITY', 'FILE_UPLOADED', 'ARTICLE_REVISION_SUBMITTED'));
