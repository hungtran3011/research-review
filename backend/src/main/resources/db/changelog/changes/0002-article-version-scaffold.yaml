databaseChangeLog:
  - changeSet:
      id: 0002-1-create-article-version-table
      author: copilot
      comment: Add article_version table for version package model
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: article_version
      changes:
        - createTable:
            tableName: article_version
            columns:
              - column:
                  name: id
                  type: varchar(255)
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: updated_at
                  type: timestamp
              - column:
                  name: created_by
                  type: varchar(255)
              - column:
                  name: updated_by
                  type: varchar(255)
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: article_id
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: version_number
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: main_attachment_id
                  type: varchar(255)
              - column:
                  name: submitted_by
                  type: varchar(255)
              - column:
                  name: submitted_at
                  type: timestamp

  - changeSet:
      id: 0002-2-article-version-indexes
      author: copilot
      comment: Add uniqueness and lookup indexes for article_version
      preConditions:
        onFail: MARK_RAN
        tableExists:
          tableName: article_version
      changes:
        - addUniqueConstraint:
            tableName: article_version
            columnNames: article_id, version_number, deleted
            constraintName: uq_article_version_article_version_deleted
        - createIndex:
            tableName: article_version
            indexName: idx_article_version_article_version
            columns:
              - column:
                  name: article_id
              - column:
                  name: version_number

  - changeSet:
      id: 0002-3-attachment-add-article-version-column
      author: copilot
      comment: Add nullable article_version_id to attachment for incremental migration
      preConditions:
        onFail: MARK_RAN
        and:
          - tableExists:
              tableName: attachment
          - not:
              columnExists:
                tableName: attachment
                columnName: article_version_id
      changes:
        - addColumn:
            tableName: attachment
            columns:
              - column:
                  name: article_version_id
                  type: varchar(255)

  - changeSet:
      id: 0002-4-article-version-foreign-keys
      author: copilot
      comment: Add foreign keys for article_version links where parent tables exist
      preConditions:
        onFail: MARK_RAN
        and:
          - tableExists:
              tableName: article_version
          - tableExists:
              tableName: article
          - tableExists:
              tableName: attachment
          - tableExists:
              tableName: users
      changes:
        - addForeignKeyConstraint:
            baseTableName: article_version
            baseColumnNames: article_id
            referencedTableName: article
            referencedColumnNames: id
            constraintName: fk_article_version_article
        - addForeignKeyConstraint:
            baseTableName: article_version
            baseColumnNames: main_attachment_id
            referencedTableName: attachment
            referencedColumnNames: id
            constraintName: fk_article_version_main_attachment
        - addForeignKeyConstraint:
            baseTableName: article_version
            baseColumnNames: submitted_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_article_version_submitted_by

  - changeSet:
      id: 0002-5-attachment-article-version-foreign-key
      author: copilot
      comment: Add attachment to article_version foreign key and index
      preConditions:
        onFail: MARK_RAN
        and:
          - tableExists:
              tableName: attachment
          - tableExists:
              tableName: article_version
          - columnExists:
              tableName: attachment
              columnName: article_version_id
      changes:
        - createIndex:
            tableName: attachment
            indexName: idx_attachment_article_version_id
            columns:
              - column:
                  name: article_version_id
        - addForeignKeyConstraint:
            baseTableName: attachment
            baseColumnNames: article_version_id
            referencedTableName: article_version
            referencedColumnNames: id
            constraintName: fk_attachment_article_version
