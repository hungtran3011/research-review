name: CI/CD to DigitalOcean Droplet

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: registry.digitalocean.com/${{ secrets.DOCR_REGISTRY_NAME }}

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: research-review-backend
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: research-review-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: doctl
          password: ${{ secrets.DOCR_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ matrix.image }}:latest

  deploy:
    name: Deploy to DigitalOcean Droplet
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure deployment directory exists on Droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT || 22 }}
          script: |
            mkdir -p /opt/research-review

      - name: Upload compose file to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT || 22 }}
          source: .github/deploy/docker-compose.prod.yml
          target: /opt/research-review/
          strip_components: 2
          overwrite: true

      - name: Pull and restart services on Droplet
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCR_REGISTRY_NAME: ${{ secrets.DOCR_REGISTRY_NAME }}
          DOCR_TOKEN: ${{ secrets.DOCR_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT || 22 }}
          envs: DOCR_REGISTRY_NAME,DOCR_TOKEN,IMAGE_TAG
          script: |
            set -e
            cd /opt/research-review

            echo "$DOCR_TOKEN" | docker login registry.digitalocean.com -u doctl --password-stdin

            if [ -f .env.backend ]; then
              set -a
              . ./.env.backend
              set +a
            fi

            export DOCR_REGISTRY="registry.digitalocean.com/$DOCR_REGISTRY_NAME"
            export IMAGE_TAG="$IMAGE_TAG"

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -af --filter "until=72h"
