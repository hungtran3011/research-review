services:
  backend:
    image: ${DOCKER_REGISTRY}/research-review-backend:${IMAGE_TAG}
    container_name: research-review-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env.backend
    volumes:
      - ./secrets:/run/secrets:ro
