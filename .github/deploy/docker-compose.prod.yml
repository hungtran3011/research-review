services:
  postgres:
    image: postgres:16-alpine
    container_name: research-review-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB:-research_review}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB:-research_review}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: research-review-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data

  backend:
    image: ${DOCR_REGISTRY}/research-review-backend:${IMAGE_TAG}
    container_name: research-review-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ${DOCR_REGISTRY}/research-review-frontend:${IMAGE_TAG}
    container_name: research-review-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
